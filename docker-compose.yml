# Polymarket Neg-Risk Arbitrage Bot - Docker Compose
#
# Usage:
#   # Scan-only mode (default):
#   docker compose up -d negrisk-scanner
#
#   # With execution (dry-run):
#   docker compose up -d negrisk-executor-dryrun
#
#   # With execution (LIVE - requires funded wallet):
#   docker compose up -d negrisk-executor-live
#
#   # View logs:
#   docker compose logs -f negrisk-scanner
#
#   # Stop:
#   docker compose down

services:
  kalshi-watchdog:
    build: .
    container_name: kalshi-watchdog
    restart: unless-stopped
    environment:
      - TZ=UTC
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - KALSHI_API_KEY=${KALSHI_API_KEY:-}
      - KALSHI_PRIVATE_KEY=${KALSHI_PRIVATE_KEY:-}
      - KALSHI_PRIVATE_KEY_PATH=${KALSHI_PRIVATE_KEY_PATH:-}
    entrypoint: ["python", "-u", "-m", "apps.watchdog"]
    command:
      - scan
      - --platform
      - kalshi
      - --config
      - config/watchdog.kalshi.yaml
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Scanner-only: detect opportunities, collect backtesting data
  negrisk-scanner:
    build: .
    container_name: negrisk-scanner
    restart: unless-stopped
    environment:
      - TZ=UTC
      # Webhook for alerts (set in .env or override)
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
    command:
      - long-test
      - --edge
      - "0.5"
      - --staleness
      - "300"
      - --gamma-legs
      - "2"
      - --record
      - --duration
      - "720"
    volumes:
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Executor dry-run: simulates order placement
  negrisk-executor-dryrun:
    build: .
    container_name: negrisk-executor-dryrun
    restart: unless-stopped
    environment:
      - TZ=UTC
      - POLYMARKET_PRIVATE_KEY=${POLYMARKET_PRIVATE_KEY}
      - POLYMARKET_FUNDER=${POLYMARKET_FUNDER}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
    command:
      - long-test
      - --edge
      - "0.3"
      - --staleness
      - "15"
      - --gamma-legs
      - "2"
      - --min-liquidity
      - "25"
      - --min-volume
      - "1000"
      - --record
      - --duration
      - "720"
      - --execute
      - --dry-run
      - --max-size
      - "50"
      - --ws-only
    volumes:
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Executor LIVE: real order placement (USE WITH CAUTION)
  negrisk-executor-live:
    build: .
    container_name: negrisk-executor-live
    restart: unless-stopped
    environment:
      - TZ=UTC
      - POLYMARKET_PRIVATE_KEY=${POLYMARKET_PRIVATE_KEY}
      - POLYMARKET_FUNDER=${POLYMARKET_FUNDER}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
    command:
      - long-test
      - --edge
      - "0.5"
      - --staleness
      - "10"
      - --gamma-legs
      - "0"
      - --min-liquidity
      - "25"
      - --min-volume
      - "1000"
      - --record
      - --duration
      - "720"
      - --execute
      - --max-size
      - "10"
      - --ws-only
    volumes:
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

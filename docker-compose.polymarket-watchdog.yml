services:
  polymarket-watchdog:
    image: ghcr.io/henryz2004/polymarket-arbitrage:latest
    container_name: polymarket-watchdog
    restart: unless-stopped
    environment:
      - TZ=UTC
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
    entrypoint: ["python", "-u", "-m", "apps.watchdog"]
    command:
      - dashboard
      - --platform
      - polymarket
      - --port
      - "8080"
    ports:
      - "8080:8080"
    volumes:
      - polymarket_watchdog_logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  polymarket_watchdog_logs:

services:
  polymarket-watchdog:
    build: .
    container_name: polymarket-watchdog
    restart: unless-stopped
    environment:
      - TZ=UTC
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
    entrypoint: ["python", "-u", "-m", "apps.watchdog"]
    command:
      - scan
      - --platform
      - polymarket
      - --config
      - config/watchdog.polymarket.yaml
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
